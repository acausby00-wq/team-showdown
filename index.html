<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald City — Yodeck TV Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #f0faf5; --bg-card: #ffffff; --bg-surface: #f4faf7; --bg-lift: #e8f5ef; --bg-hover: #edf8f2;
  --em-700: #047857; --em-600: #059669; --em-500: #10b981; --em-400: #34d399; --em-300: #6ee7b7; --em-200: #a7f3d0; --em-100: #d1fae5; --em-glow: rgba(16,185,129,.12);
  --gold-600: #d97706; --gold-400: #f59e0b; --gold-300: #fbbf24; --gold-100: #fef3c7;
  --teal-600: #0d9488; --teal-400: #2dd4bf; --teal-100: #ccfbf1;
  --red-600: #dc2626; --red-400: #f87171; --red-100: #fee2e2; --amber-400: #fb923c; --amber-100: #ffedd5;
  --text-primary: #0d2b1f; --text-secondary: #2d6a4a; --text-muted: #5a8a70; --text-accent: #059669;
  --border-soft: rgba(5,150,105,.13); --border-mid: rgba(5,150,105,.24); --border-bright: rgba(5,150,105,.45);
  --font-display: 'Cinzel', serif; --font-body: 'Outfit', sans-serif; --r: 10px; --r-lg: 16px;
}
[data-theme="dark"] {
  --bg-deep: #0b120f; --bg-card: #111c17; --bg-surface: #16241e; --bg-lift: #1d2e26; --bg-hover: #20332a;
  --text-primary: #f1f5f9; --text-secondary: #cbd5e1; --text-muted: #94a3b8; --text-accent: #34d399;
  --border-soft: rgba(52, 211, 153, 0.15); --border-mid: rgba(52, 211, 153, 0.3); --em-glow: rgba(52, 211, 153, 0.1);
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body); background: var(--bg-deep);
  background-image: radial-gradient(ellipse 60% 40% at 15% -5%, var(--em-glow) 0%, transparent 60%), radial-gradient(ellipse 40% 30% at 85% 95%, rgba(45,212,191,.06) 0%, transparent 55%), repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(5,150,105,.04) 39px, rgba(5,150,105,.04) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(5,150,105,.04) 39px, rgba(5,150,105,.04) 40px);
  min-height: 100vh; color: var(--text-primary); font-size: 15px; line-height: 1.5; transition: background-color 0.3s ease, color 0.3s ease;
  overflow-x: hidden;
}

/* ── Shell (Expanded for 1080p TV) ── */
.app { max-width: 1800px; width: 96%; margin: 0 auto; padding: 20px 0 40px; }

/* ── Hero Header ── */
.hero { position: relative; display: flex; align-items: flex-end; justify-content: space-between; padding: 28px 40px; margin-bottom: 24px; background: linear-gradient(135deg, var(--bg-card) 60%, var(--bg-lift)); border: 1px solid var(--border-mid); border-radius: var(--r-lg); overflow: hidden; animation: fadeUp .5s ease both; box-shadow: 0 4px 20px rgba(0,0,0,.12); }
.hero::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--em-glow) 0%, transparent 60%); pointer-events: none; }
.hero::after { content: 'EMERALD CITY'; position: absolute; right: -10px; top: 50%; transform: translateY(-50%) rotate(90deg); font-family: var(--font-display); font-size: 12px; letter-spacing: .35em; color: rgba(5,150,105,.07); pointer-events: none; white-space: nowrap; }
.hero-left { position: relative; z-index: 1; }
.hero-eyebrow { font-family: var(--font-display); font-size: 11px; letter-spacing: .3em; color: var(--em-400); text-transform: uppercase; margin-bottom: 8px; }
.hero-title { font-family: var(--font-display); font-size: 32px; font-weight: 700; color: var(--text-primary); line-height: 1.15; letter-spacing: .02em; }
.hero-title span { background: linear-gradient(90deg, var(--em-600), var(--teal-600)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero-sub { margin-top: 8px; font-size: 14px; color: var(--text-muted); }
.hero-right { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.period-tag { font-family: var(--font-display); font-size: 12px; letter-spacing: .15em; background: linear-gradient(135deg, var(--gold-400), var(--gold-300)); color: #0a0f0d; padding: 6px 18px; border-radius: 20px; font-weight: 600; display:flex; align-items:center; gap:8px; }
.sync-dot { width: 10px; height: 10px; background: #000; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,0,0,0.4); } 70% { box-shadow: 0 0 0 8px rgba(0,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); } }
.btn-action { background: var(--bg-card); border: 1px solid var(--border-mid); color: var(--text-primary); border-radius: var(--r); padding: 8px 18px; font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .2s; letter-spacing: .03em; text-decoration: none; display: inline-block; }

/* ── TV Grid Layout (2 Columns) ── */
.tv-grid {
  display: grid;
  grid-template-columns: 32% 66%;
  justify-content: space-between;
  align-items: start;
  gap: 24px;
}
@media (max-width: 1200px) { .tv-grid { grid-template-columns: 1fr; } }

/* ── Cards ── */
.card { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--r-lg); padding: 24px 28px; margin-bottom: 20px; animation: fadeUp .4s ease both; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ── Team Summary Cards ── */
.team-summary { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 20px; }
.team-card { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--r-lg); padding: 26px 30px; position: relative; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
.team-card.first { border-color: var(--border-mid); background: linear-gradient(135deg, var(--bg-card) 60%, var(--bg-lift)); }
.team-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
.team-card.first::before { background: linear-gradient(90deg, var(--em-600), var(--teal-400)); } .team-card.second::before { background: linear-gradient(90deg, #a7f3d0, #6ee7b7); }
.team-glow { position: absolute; top: -40px; right: -40px; width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, var(--em-glow) 0%, transparent 70%); pointer-events: none; }
.team-label { font-family: var(--font-display); font-size: 11px; letter-spacing: .25em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
.team-name-display { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 14px; letter-spacing: .04em; }
.team-score-big { font-family: var(--font-body); font-size: 48px; font-weight: 300; line-height: 1; }
.team-card.first .team-score-big { color: var(--em-500); } .team-card.second .team-score-big { color: var(--text-muted); }
.team-rank-note { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
.leading-chip { display: inline-block; font-family: var(--font-display); font-size: 10px; letter-spacing: .2em; background: linear-gradient(90deg, var(--gold-600), var(--gold-400)); color: white; padding: 4px 14px; border-radius: 20px; font-weight: 700; margin-top: 8px; }

/* ── Tables ── */
.table-wrap { overflow-x: auto; } 
table { width: 100%; border-collapse: collapse; font-size: 15px; }
thead th { padding: 12px 14px; font-family: var(--font-display); font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--text-muted); font-weight: 600; background: var(--bg-surface); border-bottom: 1px solid var(--border-soft); white-space: nowrap; }
thead th.center { text-align: center; }
tbody td { padding: 14px 14px; border-bottom: 1px solid var(--border-soft); vertical-align: middle; color: var(--text-primary); }
tbody td.center { text-align: center; } 
tbody tr:last-child td { border-bottom: none; }
.rbadge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; font-weight: 600; font-size: 13px; font-family: var(--font-body); background: var(--bg-lift); color: var(--text-muted); }
.rbadge.gold { background: linear-gradient(135deg,#d97706,#fbbf24); color: white; } .rbadge.silver { background: linear-gradient(135deg,#6b7280,#9ca3af); color: white; } .rbadge.bronze { background: linear-gradient(135deg,#b45309,#d97706); color: white; }
.pill { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; font-family: var(--font-body); }
.pill-green { background: rgba(209,250,229,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); } .pill-yellow { background: rgba(254,243,199,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); } .pill-red { background: rgba(254,226,226,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: .06em; padding: 3px 10px; border-radius: 10px; font-family: var(--font-display); }
.tag-dom { background: rgba(204,251,241,0.15); color: #14b8a6; border: 1px solid rgba(20,184,166,0.3); } .tag-clove { background: rgba(254,243,199,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
.cg { color: #10b981; font-weight: 500; } .cy { color: #f59e0b; font-weight: 500; } .cr { color: #ef4444; font-weight: 500; }
.c-gap { color: #ef4444; font-size: 13px; font-weight: 600; font-family: var(--font-body); } .c-focus { color: #ef4444; font-size: 13px; font-weight: 600; }

.section-lbl { font-family: var(--font-display); font-size: 12px; letter-spacing: .22em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 16px; border-bottom: 1px solid var(--border-soft); padding-bottom: 8px;}

/* ── Sync / Error State ── */
.period-tag.is-stale { background: linear-gradient(135deg, var(--red-400), var(--red-600)); color: #fff; }
.period-tag.is-stale .sync-dot { background: #fff; }
.data-error-banner { display: none; align-items: center; gap: 10px; background: var(--red-100); border: 1px solid rgba(220,38,38,.3); color: var(--red-600); border-radius: var(--r); padding: 10px 18px; margin-bottom: 16px; font-size: 13px; font-weight: 500; }
.data-error-banner.show { display: flex; }
</style>
</head>
<body>
<script>
  (function() {
    if (localStorage.getItem('ec_theme') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); }
  })();
</script>

<div class="app">
  <header class="hero" style="animation-delay:.05s">
    <div class="hero-left">
      <div class="hero-eyebrow">Connectivity Source &mdash; Emerald City</div>
      <h1 class="hero-title">Team <span>Showdown</span></h1>
      <div class="hero-sub" id="team-names-sub">The Vipers (Team Dom) &middot; The Phantoms (Team Clove)</div>
    </div>
    <div class="hero-right">
      <div class="header-actions">
        <button class="btn-action" id="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
      </div>
      <span class="period-tag" id="period-tag"><div class="sync-dot"></div> <span id="sync-label">Live Sync</span></span>
    </div>
  </header>

  <div class="data-error-banner" id="data-error-banner">⚠ <span id="data-error-text">Couldn't reach the live data source. Check Google Sheet sharing permissions.</span></div>

  <div class="tv-grid">
      <div class="tv-sidebar" id="tv-team-section">
          </div>
      <div class="tv-main" id="tv-leaderboard-section">
          </div>
  </div>

</div>

<script>
/* --- LIVE DATA LINK (Restored to the 2PACX Publish Link) --- */
const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/14NRqBdyJUhgyLaszqpiRjxiE7oIOx-kpXpF-7KMvdFI/export?format=csv&gid=0";

function toggleTheme() {
  const html = document.documentElement;
  const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('ec_theme', newTheme);
  document.getElementById('theme-toggle').innerHTML = newTheme === 'dark' ? '☀️ Light' : '🌙 Dark';
}

window.addEventListener('DOMContentLoaded', () => {
  if (document.documentElement.getAttribute('data-theme') === 'dark') {
    document.getElementById('theme-toggle').innerHTML = '☀️ Light';
  }
  fetchData();
  // Auto refresh every 5 minutes (300,000 milliseconds) for Yodeck
  setInterval(fetchData, 300000); 
});

const TEAM_NAMES = {
  "Team Dom": { display: "The Vipers", og: "Team Dom" },
  "Team Clove": { display: "The Phantoms", og: "Team Clove" }
};

const METRICS = [
  { key:"Postpaid Voice", goal:20,  teamGoal: 95, weight:17.5, unit:"", isVol: true },
  { key:"BTS",            goal:16,  teamGoal: 64, weight:17.5, unit:"", isVol: true },
  { key:"HSI",            goal:8,   teamGoal: 29, weight:12.5, unit:"", isVol: true },
  { key:"APK",            goal:2.0, teamGoal: 2.0, weight:5, unit:"", isVol: false },
  { key:"CSAT",           goal:9.2, teamGoal: 9.2, weight:10, unit:"", isVol: false },
  { key:"Visa App Rate",  goal:7.5, teamGoal: 7.5, weight:12.5, unit:"%", isVol: false },
  { key:"Premium Mix",    goal:80,  teamGoal: 80, weight:12.5, unit:"%", isVol: false },
  { key:"P360",           goal:40,  teamGoal: 40, weight:12.5, unit:"%", isVol: false }
];

let repsData = [];

function formatSyncTime(date) {
    return date.toLocaleString('en-US', {
        month: 'long', day: 'numeric', hour: 'numeric', minute: '2-digit'
    });
}

function setSyncState(ok, when) {
    const tag = document.getElementById('period-tag');
    const label = document.getElementById('sync-label');
    const banner = document.getElementById('data-error-banner');
    if (ok) {
        tag.classList.remove('is-stale');
        label.textContent = `Live Sync · ${formatSyncTime(when)}`;
        banner.classList.remove('show');
    } else {
        tag.classList.add('is-stale');
        label.textContent = when ? `Sync Failed · Last OK ${formatSyncTime(when)}` : 'Sync Failed';
        banner.classList.add('show');
    }
}

let lastSuccessfulSync = null;

// Fetch data from Google Sheets
async function fetchData() {
    try {
        const response = await fetch(GOOGLE_SHEET_CSV_URL);
        if (!response.ok || response.headers.get("content-type").includes("text/html")) {
            throw new Error("Sheet is likely restricted or invalid URL.");
        }
        const csvText = await response.text();
        parseCSV(csvText);
        lastSuccessfulSync = new Date();
        setSyncState(true, lastSuccessfulSync);
    } catch (error) {
        console.error("Error fetching data:", error);
        setSyncState(false, lastSuccessfulSync);
    }
}

// Parses a single CSV line, respecting double-quoted fields that may contain commas.
function parseCSVLine(line) {
    const cols = [];
    let cur = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
            if (inQuotes && line[i + 1] === '"') { cur += '"'; i++; } // escaped quote
            else { inQuotes = !inQuotes; }
        } else if (ch === ',' && !inQuotes) {
            cols.push(cur.trim());
            cur = '';
        } else {
            cur += ch;
        }
    }
    cols.push(cur.trim());
    return cols;
}

function parseCSV(csvText) {
    const rows = csvText.trim().split('\n');
    const headers = parseCSVLine(rows[0]);
    
    repsData = [];
    
    for(let i = 1; i < rows.length; i++) {
        if(!rows[i].trim()) continue;
        const cols = parseCSVLine(rows[i]);
        let rep = { name: cols[0], team: cols[1], data: {} };
        
        METRICS.forEach(m => {
            let index = headers.indexOf(m.key);
            rep.data[m.key] = index > -1 ? (parseFloat(cols[index]) || 0) : 0;
        });
        
        if(rep.name && rep.team) {
            repsData.push(processRep(rep));
        }
    }
    
    repsData.sort((a,b) => b.composite - a.composite);
    renderYodeckLayout();
}

function getWeights() {
  const total = METRICS.reduce((a,b)=>a+b.weight,0)||1;
  return METRICS.map(m => m.weight/total);
}

// Each metric's %-to-goal is capped here before it's weighted into the
// composite. 125% matches where payout actually tops out, so someone
// blowing way past a small, easy-to-overshoot goal (like Visa App Rate)
// can't single-handedly outweigh being at zero on a core metric like Voice.
const COMPOSITE_CAP = 125;

function processRep(rawRep) {
  const weights = getWeights();
  let composite=0, lowestPct=Infinity, focusArea="", focusGap=0;
  const mp = {};
  
  METRICS.forEach((m,i)=>{
    const val = rawRep.data[m.key];
    const pct = (val/m.goal)*100;
    const cappedPct = Math.min(pct, COMPOSITE_CAP);
    composite += cappedPct*weights[i];
    mp[m.key] = {pct, val, goal:m.goal, unit:m.unit};
    if(pct < lowestPct){
        lowestPct=pct; focusArea=m.key; focusGap=m.goal-val;
    }
  });
  
  return {name: rawRep.name, team: rawRep.team, composite, focusArea, focusGap, mp};
}

/* ── Visual Helpers ── */
function pillCls(s){ return s>=100?"pill-green":s>=80?"pill-yellow":"pill-red"; }
function colorCls(p){ return p>=100?"cg":p>=80?"cy":"cr"; }
function rbadge(i){ const c=i===0?"gold":i===1?"silver":i===2?"bronze":""; return `<span class="rbadge ${c}">${i+1}</span>`; }
function teamTag(t){ const cls = t==="Team Dom"?"tag-dom":"tag-clove"; const d = TEAM_NAMES[t] ? TEAM_NAMES[t].display : t; return `<span class="tag ${cls}">${d}</span>`; }
function teamFullLabel(t){ const tn=TEAM_NAMES[t] || {display: t, og: t}; return `${tn.display} <span style="font-size:11px;color:var(--text-muted)">(${tn.og})</span>`; }

/* ── Render Yodeck Layout ── */
function renderYodeckLayout() {
  if (repsData.length === 0) return;
  const weights = getWeights();

  // 1. Calculate Team Data for Left Sidebar
  const teams={};
  repsData.forEach(r=>{
    if(!teams[r.team]) teams[r.team]={reps:[], rawSum:{}};
    teams[r.team].reps.push(r);
    METRICS.forEach(m=>{ teams[r.team].rawSum[m.key] = (teams[r.team].rawSum[m.key]||0) + r.mp[m.key].val; });
  });

  const tArr = Object.keys(teams).map(t=>{
    const tm = teams[t]; let teamComposite = 0; const mtPct = {};
    METRICS.forEach((m, i) => {
      let teamActual = m.isVol ? tm.rawSum[m.key] : (tm.rawSum[m.key] / tm.reps.length);
      let pct = (teamActual / m.teamGoal) * 100;
      mtPct[m.key] = pct; teamComposite += pct * weights[i];
    });
    return { name:t, avg: teamComposite, reps: tm.reps, mt: mtPct, count: tm.reps.length };
  }).sort((a,b)=>b.avg-a.avg);

  // Build Left Sidebar HTML
  let tHTML = `<div class="section-lbl">Team Standings</div><div class="team-summary">`;
  tArr.forEach((t,i)=>{
    tHTML+=`<div class="team-card ${i===0?"first":"second"}"><div class="team-glow"></div><div class="team-label">Team</div><div class="team-name-display">${teamFullLabel(t.name)}</div><div class="team-score-big">${t.avg.toFixed(1)}<span style="font-size:24px">%</span></div>${i===0?`<div><span class="leading-chip">LEADING</span></div>`:`<div class="team-rank-note">#2 this period</div>`}</div>`;
  });
  tHTML += `</div>`;
  
  tHTML += `<div class="card"><div class="section-lbl">Team Metric Breakdown (% to Target)</div><div class="table-wrap"><table><thead><tr><th>Team</th>`;
  METRICS.forEach(m => { tHTML += `<th class="center">${m.key}</th>`; });
  tHTML += `</tr></thead><tbody>`;
  
  tArr.forEach(t=>{
    tHTML+=`<tr><td><strong>${teamFullLabel(t.name)}</strong></td>`;
    METRICS.forEach(m=>{ const pct = t.mt[m.key]; tHTML+=`<td class="center"><span class="${colorCls(pct)}">${pct.toFixed(1)}%</span></td>`; });
    tHTML+=`</tr>`;
  });
  tHTML+=`</tbody></table></div></div>`;
  
  document.getElementById("tv-team-section").innerHTML = tHTML;

  // 2. Build Right Main HTML (Leaderboard)
  let iHTML = `<div class="card" style="height: 100%;"><div class="section-lbl">Individual Leaderboard</div><div class="table-wrap"><table><thead><tr><th>#</th><th>Name</th><th>Team</th><th class="center">Composite</th>`;
  METRICS.forEach(m => { iHTML += `<th class="center">${m.key}</th>`; });
  iHTML += `<th>Focus Area</th><th>Gap</th></tr></thead><tbody>`;
  
  repsData.forEach((r,i)=>{
    iHTML+=`<tr><td>${rbadge(i)}</td><td style="font-size:16px;"><strong>${r.name}</strong></td><td>${teamTag(r.team)}</td>`;
    iHTML+=`<td class="center"><span class="pill ${pillCls(r.composite)}">${r.composite.toFixed(1)}%</span></td>`;
    METRICS.forEach(m=>{ const p=r.mp[m.key]; iHTML+=`<td class="center"><span class="${colorCls(p.pct)}">${p.val}${m.unit||""}</span></td>`; });
    const gap=r.focusGap>0?`-${r.focusGap.toFixed(1)}`:"On track";
    iHTML+=`<td class="c-focus">${r.focusArea}</td><td class="c-gap">${gap}</td></tr>`;
  });
  iHTML+=`</tbody></table></div></div>`;
  
  document.getElementById("tv-leaderboard-section").innerHTML = iHTML;
}
</script>
</body>
</html>
